<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Predictor</title>
    <style>
        :root {
            --primary-blue: #007bff;
            --success-green: #28a745;
            --danger-red: #dc3545;
            --light-bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 0.9em; }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .checkbox-group { display: flex; gap: 20px; margin: 15px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.9em; cursor: pointer; }
        button { width: 100%; padding: 14px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: background 0.3s ease; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 10px; background-color: #f1f3f5; text-align: center; border-left: 5px solid var(--primary-blue); }
        .prediction-text { font-size: 1.4em; font-weight: bold; display: block; margin-bottom: 5px; }
        .confidence-text { color: #666; font-size: 0.95em; }
        .disclaimer { font-size: 0.75em; color: #999; margin-top: 20px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>🩺 Diabetes Assessment</h2>
    
    <form action="/predict" method="post">
        <div class="form-group">
            <label>Patient Age</label>
            <input type="number" name="age" placeholder="e.g. 45" required min="1" max="120">
        </div>

        <div class="form-group">
            <label>Body Mass Index (BMI)</label>
            <input type="number" step="0.1" name="bmi" placeholder="e.g. 27.5" required>
        </div>

        <div class="form-group">
            <label>HbA1c Level (%)</label>
            <input type="number" step="0.1" name="hba1c" placeholder="e.g. 6.5" required>
        </div>

        <div class="form-group">
            <label>Blood Glucose (mg/dL)</label>
            <input type="number" name="glucose" placeholder="e.g. 140" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Smoking History</label>
            <select name="smoking">
                <option value="never">Never Smoked</option>
                <option value="current">Current Smoker</option>
                <option value="former">Former Smoker</option>
                <option value="not_current">Not Current</option>
                <option value="ever">Ever Smoked</option>
                <option value="no_info">No Information</option>
            </select>
        </div>

        <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" name="hypertension"> Hypertension
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="heart_disease"> Heart Disease
            </label>
        </div>

        <button type="submit">Run Diagnostic Model</button>
    </form>

    {% if prediction %}
    <div class="result-box">
        <span class="prediction-text">{{ prediction }}</span>
        <span class="confidence-text">Model Probability: <strong>{{ confidence }}</strong></span>
    </div>
    {% endif %}

    <p class="disclaimer">
        <strong>Disclaimer:</strong> This is a student-developed predictive model for educational purposes only. 
        It does not constitute medical advice.
    </p>
</div>

</body>
</html>
