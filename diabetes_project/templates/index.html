<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Predictor</title>
    <style>
        :root { --primary-blue: #007bff; --light-bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: var(--primary-blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 10px; background-color: #f1f3f5; text-align: center; border-left: 5px solid var(--primary-blue); }
    </style>
</head>
<body>
<div class="container">
    <h2>🩺 Diabetes Assessment</h2>
    <form action="/predict" method="post">
        <div class="form-group"><label>Age</label><input type="number" name="age" required></div>
        <div class="form-group"><label>BMI</label><input type="number" step="0.1" name="bmi" required></div>
        <div class="form-group"><label>HbA1c Level</label><input type="number" step="0.1" name="hba1c" required></div>
        <div class="form-group"><label>Blood Glucose</label><input type="number" name="glucose" required></div>
        <div class="form-group">
            <label>Gender</label>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Smoking History</label>
            <select name="smoking">
                <option value="never">Never Smoked</option>
                <option value="current">Current Smoker</option>
                <option value="former">Former Smoker</option>
                <option value="no_info">No Information</option>
            </select>
        </div>
        <button type="submit">Run Diagnostic Model</button>
    </form>
    {% if prediction %}
    <div class="result-box">
        <h3>{{ prediction }}</h3>
        <p>Probability: {{ confidence }}</p>
    </div>
    {% endif %}
</div>
</body>
</html>
